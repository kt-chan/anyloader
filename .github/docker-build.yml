name: Native Multi-Arch Docker Build

on:
  push:
    tags:
      - 'v*' # 当推送形如 v1.0.0 的标签时触发

env:
  REGISTRY: ghcr.io
  # Ensure your repository name doesn't contain uppercase letters, 
  # as Docker image names must be strictly lowercase.
  IMAGE_NAME: ${{ github.repository }}/loader

jobs:
  # ==================== 阶段1：为每个架构进行原生构建 ====================
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false  # 允许一个架构构建失败后，其他架构继续构建
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            dockerfile: docker/Dockerfile.loader
            artifact_name: amd64      # Added safe artifact name without slashes
          - platform: linux/arm64
            runner: ubuntu-24.04-arm  # 使用 GitHub 官方 ARM64 原生 Runner
            dockerfile: docker/Dockerfile.loader
            artifact_name: arm64      # Added safe artifact name without slashes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,"name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",push-by-digest=true,name-canonical=true,push=true
          # 推荐配置缓存，以加速后续构建
          cache-from: ${{ matrix.platform == 'linux/amd64' && 'type=gha' || '' }}
          cache-to: ${{ matrix.platform == 'linux/amd64' && 'type=gha,mode=max' || '' }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          # Used the safe artifact_name here to prevent invalid character errors
          name: digests-${{ matrix.artifact_name }} 
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ==================== 阶段2：合并为多架构清单 ====================
  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          # Use jq with DOCKER_METADATA_OUTPUT_JSON to correctly format multiple tags as '-t tag1 -t tag2'
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)